<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩网站</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>图片压缩工具</h2>
        <input type="file" id="upload" accept="image/png, image/jpeg, image/gif" />
        <select id="formatSelect">
            <option value="image/jpeg">JPG</option>
            <option value="image/png">PNG</option>
            <option value="image/gif">GIF</option>
        </select>
        <input type="number" id="compressionRatio" placeholder="压缩比例(%)" min="1" max="100" value="50" />
        <button onclick="location.href='compress.html'">压缩图片</button>
        <button onclick="location.href='convert.html'">转换格式</button>
        <button onclick="location.href='convertToFile.html'">合成 Word/PDF 文件</button>
    </div>
</body>
</html>
