<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>图片格式转换工具</h2>
        <input type="file" id="upload" accept="image/png, image/jpeg, image/gif" />
        <select id="formatSelect">
            <option value="image/jpeg">JPG</option>
            <option value="image/png">PNG</option>
            <option value="image/gif">GIF</option>
        </select>
        <button id="convertBtn">转换格式</button>
        <div class="preview">
            <h3>原始图片</h3>
            <img id="originalImage" />
            <div class="size" id="originalSize"></div>
            <h3>转换后的图片</h3>
            <img id="convertedImage" />
            <div class="size" id="convertedSize"></div>
            <a id="downloadLink" style="display:none;">下载转换后的图片</a>
        </div>
    </div>
    <script src="convert.js"></script>
</body>
</html>
